<!-- tourneys.html - TOURNAMENTS PAGE -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WNG - Tourneys</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0f0f0f;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
        }
        
        nav {
            background-color: #1a1a1a;
            padding: 1rem;
            border-bottom: 1px solid #333;
        }
        
        nav a {
            color: #fff;
            text-decoration: none;
            margin-right: 20px;
            font-weight: 600;
        }
        
        nav a:hover {
            color: #888;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        h1 {
            margin-bottom: 2rem;
        }
        
        /* Tournament list styling */
        .tourney-section {
            margin-bottom: 3rem;
        }
        
        h2 {
            border-bottom: 2px solid #333;
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }
        
        .tourney-card {
            background-color: #1a1a1a;
            border: 1px solid #333;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
        }
        
        .tourney-name {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        
        .tourney-date {
            color: #888;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }
        
        .standings {
            background-color: #0f0f0f;
            border: 1px solid #444;
            padding: 1rem;
            margin-top: 1rem;
            border-radius: 3px;
        }
        
        .standings h3 {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        
        .standing-place {
            padding: 0.3rem 0;
            border-bottom: 1px solid #222;
        }
        
        .standing-place:last-child {
            border-bottom: none;
        }
        
        .bracket-container {
            margin-top: 1.5rem;
            border: 1px solid #333;
            border-radius: 4px;
            overflow: hidden;
        }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: #555;
            font-size: 0.8rem;
            margin-top: 3rem;
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">Team</a>
        <a href="tourneys.html">Tourneys</a>
    </nav>

    <div class="container">
        <h1>Tourneys</h1>
        
        <!-- UPCOMING TOURNAMENTS - EDIT HERE -->
        <div class="tourney-section">
            <h2>Upcoming</h2>
            
            <!-- ADD NEW UPCOMING TOURNEYS HERE -->
            <div class="tourney-card">
                <div class="tourney-name">WNG Tourney</div>
                <div class="tourney-date">18.04.2026</div>
                <p>First WNG tournament.</p>
                
                <div class="bracket-container">
                    <iframe src="https://brackethq.com/b/q9cdd/embed/" width="100%" height="550" frameborder="0"></iframe>
                </div>
            </div>
            <!-- END UPCOMING -->
            
        </div>
        
        <!-- PAST TOURNAMENTS - EDIT HERE -->
        <div class="tourney-section">
            <h2>Past</h2>
            
            <!-- 
            EXAMPLE OF HOW TO ADD PAST TOURNEY (copy and fill):
            
            <div class="tourney-card">
                <div class="tourney-name">TOURNEY NAME</div>
                <div class="tourney-date">DATE</div>
                
                <div class="standings">
                    <h3>Final Standings</h3>
                    <div class="standing-place">1st: NAME</div>
                    <div class="standing-place">2nd: NAME</div>
                    <div class="standing-place">3rd: NAME</div>
                </div>
            </div>
            -->
            
            <!-- FIRST TOURNEY (Move here after its done) -->
            <div class="tourney-card">
                <div class="tourney-name">WNG Tourney</div>
                <div class="tourney-date">18.04.2026</div>
                
                <div class="standings">
                    <h3>Final Standings</h3>
                    <div class="standing-place">1st: -</div>
                    <div class="standing-place">2nd: -</div>
                    <div class="standing-place">3rd: -</div>
                </div>
            </div>
            
        </div>
    </div>

    <footer>
        WNG Team © 2026
    </footer>

</body>
</html>
